session_name: slashfiles
options:
  remain-on-exit: on
windows:
  - window_name: edit
    layout: main-vertical
    options:
      other-pane-width: 100
    panes:
      - shell_command: nix run .#nvf
      - shell_command: mask test watch
      - shell_command: mask switch watch

  - window_name: home-manager
    panes:
      - shell_command: man 5 home-configuration.nix

  - window_name: nix-darwin
    panes:
      - shell_command: man 5 configuration.nix

  - window_name: nix-darwin
    panes:
      - shell_command: man 5 nvf
