session_name: slashfiles
global_options:
  remain-on-exit: true
windows:
  - window_name: edit
    layout: main-vertical
    options:
      remain-on-exit: true
      other-pane-width: 100
    panes:
      - shell_command: nix run .#nvf
      - shell: mask test watch
      - shell: mask switch watch

  - window_name: home-manager
    panes:
      - shell: man 5 home-configuration.nix

  - window_name: nix-darwin
    panes:
      - shell: man 5 configuration.nix

  - window_name: nvf
    panes:
      - shell: man 5 nvf
